<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebM to MP4 Converter</title>
    <!-- Memuat FFmpeg versi WebAssembly -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        /* Desain UI Retro */
        body {
            background-color: #008080;
            font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #000;
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-top-color: #fff;
            border-left-color: #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            width: 450px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .window-body {
            padding: 15px;
        }

        .fieldset {
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 10px;
            margin-bottom: 15px;
        }

        button, input[type="file"]::file-selector-button {
            background-color: #c0c0c0;
            border: 2px solid;
            border-top-color: #fff;
            border-left-color: #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        button:active {
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        button:disabled {
            color: #808080;
            text-shadow: 1px 1px #fff;
            cursor: not-allowed;
        }

        #log-terminal {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            border: 2px inset #fff;
            font-size: 12px;
            margin-top: 10px;
        }

        #output-video {
            margin-top: 10px;
            border: 2px solid #808080;
            background: #000;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Video Converter.exe</span>
        <span>X</span>
    </div>
    <div class="window-body">
        <div class="fieldset">
            <p style="margin-top: 0;">Pilih file WebM untuk dikonversi:</p>
            <input type="file" id="uploader" accept="video/webm">
        </div>
        
        <button id="btn-convert" disabled>Mulai Konversi (MP4)</button>
        <br>
        
        <div id="log-terminal">Terminal siap...</div>
        
        <video id="output-video" width="100%" controls style="display:none;"></video>
        
        <div style="margin-top: 10px; text-align: right;">
            <a id="download-link" style="display:none;" download="hasil_konversi.mp4">
                <button>Simpan MP4</button>
            </a>
        </div>
    </div>
</div>

<script>
    // Memanggil modul FFmpeg
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // Inisialisasi engine dan menyambungkan log ke terminal UI
    const terminal = document.getElementById('log-terminal');
    const ffmpeg = createFFmpeg({
        log: true,
        logger: ({ message }) => {
            terminal.innerHTML += `<div>${message}</div>`;
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll ke bawah
        }
    });

    const uploader = document.getElementById('uploader');
    const btnConvert = document.getElementById('btn-convert');
    const outputVideo = document.getElementById('output-video');
    const downloadLink = document.getElementById('download-link');

    let videoFile = null;

    // Deteksi saat file dipilih
    uploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if (videoFile) {
            btnConvert.disabled = false;
            terminal.innerHTML = `<div>File dimuat: ${videoFile.name}</div>`;
        }
    });

    // Proses konversi saat tombol ditekan
    btnConvert.addEventListener('click', async () => {
        if (!videoFile) return;

        btnConvert.disabled = true;
        uploader.disabled = true;
        terminal.innerHTML += "<div>Memuat engine FFmpeg (ini mungkin memakan waktu)...</div>";

        try {
            // Load FFmpeg.wasm jika belum
            if (!ffmpeg.isLoaded()) {
                await ffmpeg.load();
            }

            terminal.innerHTML += "<div>Engine siap. Mulai proses re-encoding...</div>";
            
            // Menulis file ke Virtual File System (Memory)
            ffmpeg.FS('writeFile', 'input.webm', await fetchFile(videoFile));

            // Menjalankan perintah FFmpeg (sama seperti perintah di command line terminal)
            await ffmpeg.run('-i', 'input.webm', 'output.mp4');

            terminal.innerHTML += "<div>Proses selesai! Menyusun file MP4...</div>";

            // Membaca file hasil dari memory
            const data = ffmpeg.FS('readFile', 'output.mp4');
            
            // Membuat URL dari data binary (Blob) untuk ditampilkan & didownload
            const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            outputVideo.src = videoUrl;
            outputVideo.style.display = 'block';
            
            downloadLink.href = videoUrl;
            downloadLink.style.display = 'inline-block';
            
        } catch (error) {
            terminal.innerHTML += `<div style="color:red;">Error: ${error.message}</div>`;
        } finally {
            btnConvert.disabled = false;
            uploader.disabled = false;
        }
    });
</script>

</body>
</html>
