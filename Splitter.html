<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Grid Splitter 95</title>
  <style>
    :root{
      --bg:#c0c0c0;
      --panel:#d4d0c8;
      --light:#ffffff;
      --shadow:#808080;
      --title:#000080;
      --titleText:#ffffff;
      --field:#ffffff;
      --text:#000000;
      --blue:#0000ff;
      --blueSoft:#7aa7ff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: Tahoma, Verdana, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.08) 75%),
        var(--bg);
      background-size:24px 24px;
      -webkit-tap-highlight-color: transparent;
    }

    .app{
      width:min(1240px, 100%);
      margin:0 auto;
      padding:10px;
    }

    .window{
      border:2px solid var(--light);
      box-shadow:
        inset 1px 1px 0 var(--light),
        inset -1px -1px 0 var(--shadow),
        2px 2px 0 rgba(0,0,0,.18);
      background:var(--panel);
      overflow:hidden;
    }

    .titlebar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 10px;
      background:linear-gradient(90deg, #000080, #1084d0);
      color:var(--titleText);
      font-weight:700;
      font-size:16px;
      user-select:none;
    }

    .title-left{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .icon{
      width:16px;
      height:16px;
      flex:0 0 auto;
      border:1px solid #fff;
      background:
        linear-gradient(135deg, #fff 0 25%, #000080 25% 50%, #fff 50% 75%, #000080 75% 100%);
    }

    .chip{
      flex:0 0 auto;
      font-size:12px;
      padding:3px 8px;
      border:1px solid rgba(255,255,255,.45);
      border-radius:999px;
      opacity:.95;
    }

    .content{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:10px;
      padding:10px;
    }

    .panel{
      min-width:0;
      border:2px solid;
      border-color: var(--light) var(--shadow) var(--shadow) var(--light);
      background:var(--panel);
      padding:10px;
    }

    .group{
      margin-bottom:10px;
      padding:8px;
      border:2px solid;
      border-color: var(--shadow) var(--light) var(--light) var(--shadow);
      background:var(--panel);
    }

    .group h3{
      margin:0 0 8px;
      font-size:13px;
      font-weight:700;
    }

    .row{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    label{
      font-size:13px;
      line-height:1.2;
    }

    input[type="file"]{
      width:100%;
      font:inherit;
      font-size:13px;
    }

    input[type="number"],
    input[type="text"]{
      width:100%;
      font:inherit;
      font-size:13px;
      border:2px solid;
      border-color: var(--shadow) var(--light) var(--light) var(--shadow);
      background:var(--field);
      padding:8px;
      outline:none;
    }

    .small{
      font-size:12px;
      line-height:1.4;
      color:#222;
    }

    .btnrow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    button{
      appearance:none;
      border:2px solid;
      border-color: var(--light) var(--shadow) var(--shadow) var(--light);
      background:#c0c0c0;
      color:#000;
      font:inherit;
      font-size:13px;
      min-height:36px;
      padding:8px 12px;
      cursor:pointer;
      user-select:none;
    }

    button:hover{ background:#d9d9d9; }
    button:active{
      border-color: var(--shadow) var(--light) var(--light) var(--shadow);
      transform:translateY(1px);
    }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .primary{
      font-weight:700;
    }

    .preview{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .canvasWrap{
      position:relative;
      width:100%;
      aspect-ratio: 1 / 1;
      border:2px solid;
      border-color: var(--shadow) var(--light) var(--light) var(--shadow);
      background:#fff;
      overflow:hidden;
      touch-action:none;
      min-height:260px;
    }

    .baseCanvas,
    .gridCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .gridCanvas{
      pointer-events:auto;
      cursor:grab;
    }

    .gridCanvas:active{
      cursor:grabbing;
    }

    .empty{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      font-size:14px;
      line-height:1.5;
      color:#333;
      background:
        linear-gradient(45deg, #efefef 25%, transparent 25%),
        linear-gradient(-45deg, #efefef 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #efefef 75%),
        linear-gradient(-45deg, transparent 75%, #efefef 75%);
      background-size:16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    .hidden{ display:none !important; }

    .status{
      font-size:13px;
      line-height:1.4;
      min-height:20px;
    }

    .resultsHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .resultsHeader h3{
      margin:0;
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap:10px;
    }

    .card{
      border:2px solid;
      border-color: var(--light) var(--shadow) var(--shadow) var(--light);
      background:var(--panel);
      padding:8px;
      min-width:0;
    }

    .thumb{
      width:100%;
      aspect-ratio:1/1;
      border:1px solid #777;
      background:
        linear-gradient(45deg, #ececec 25%, transparent 25%),
        linear-gradient(-45deg, #ececec 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ececec 75%),
        linear-gradient(-45deg, transparent 75%, #ececec 75%);
      background-size:16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .thumb img{
      max-width:100%;
      max-height:100%;
      display:block;
    }

    .cardMeta{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin:8px 0;
      font-size:12px;
    }

    .footerbar{
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      font-size:12px;
      color:#222;
    }

    .kbd{
      border:1px solid #666;
      background:#efefef;
      padding:1px 4px;
      border-radius:3px;
      font-size:11px;
    }

    @media (max-width: 920px){
      .content{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 520px){
      .app{ padding:6px; }
      .titlebar{ padding:7px 8px; font-size:14px; }
      .chip{ display:none; }
      .panel{ padding:8px; }
      .group{ padding:7px; }
      .grid{ grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      button{ width:100%; }
      .btnrow{ flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="window">
      <div class="titlebar">
        <div class="title-left">
          <div class="icon"></div>
          <div>Grid Splitter 95</div>
        </div>
        <div class="chip">simpel • mobile friendly</div>
      </div>

      <div class="content">
        <div class="panel">
          <div class="group">
            <h3>Gambar</h3>
            <div class="row">
              <input id="file" type="file" accept="image/*" />
            </div>
          </div>

          <div id="controls" class="group hidden">
            <h3>Grid</h3>

            <div class="row">
              <label for="fileName">Nama file</label>
              <input id="fileName" type="text" value="image" maxlength="80" />
            </div>

            <div class="row">
              <label for="cols">Kolom</label>
              <input id="cols" type="number" min="1" max="24" step="1" value="4" />
            </div>

            <div class="row">
              <label for="rows">Baris</label>
              <input id="rows" type="number" min="1" max="24" step="1" value="4" />
            </div>

            <div class="row">
              <label for="gap">Jarak antar grid (px)</label>
              <input id="gap" type="number" min="0" max="100" step="1" value="0" />
            </div>

            <div class="small">
              Titik bulat bisa digeser untuk mengubah garis. Area dalam grid bisa diseret untuk memindahkan semuanya.
            </div>

            <div class="btnrow" style="margin-top:10px;">
              <button id="split" class="primary">Potong</button>
            </div>
          </div>

          <div id="exportBox" class="group hidden">
            <h3>Ekspor</h3>
            <div class="btnrow">
              <button id="downloadZip" class="primary hidden">Download ZIP</button>
              <button id="downloadAll" class="hidden">Download PNG</button>
            </div>
            <div class="small" style="margin-top:8px;">
              Nama file: <span class="kbd">part-01.png</span>, <span class="kbd">part-02.png</span>, dst.
            </div>
          </div>

          <div class="group">
            <h3>Status</h3>
            <div id="status" class="status">Belum ada gambar dimuat.</div>
          </div>
        </div>

        <div class="preview">
          <div class="group">
            <h3>Preview</h3>
            <div id="canvasWrap" class="canvasWrap">
              <div id="empty" class="empty">Upload gambar dulu.</div>
              <canvas id="baseCanvas" class="baseCanvas hidden"></canvas>
              <canvas id="gridCanvas" class="gridCanvas hidden"></canvas>
            </div>
          </div>

          <div id="resultHeader" class="resultsHeader hidden">
            <h3>Hasil</h3>
            <div class="small" id="resultCount">0 bagian</div>
          </div>

          <div id="resultGrid" class="grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    const els = {
      file: $("file"),
      controls: $("controls"),
      exportBox: $("exportBox"),
      fileName: $("fileName"),
      cols: $("cols"),
      rows: $("rows"),
      gap: $("gap"),
      split: $("split"),
      downloadZip: $("downloadZip"),
      downloadAll: $("downloadAll"),
      status: $("status"),
      resultHeader: $("resultHeader"),
      resultCount: $("resultCount"),
      resultGrid: $("resultGrid"),
      canvasWrap: $("canvasWrap"),
      empty: $("empty"),
      baseCanvas: $("baseCanvas"),
      gridCanvas: $("gridCanvas"),
    };

    let sourceImage = null;
    let sourceName = "image";
    let sourceW = 0;
    let sourceH = 0;
    let previewScale = 1;
    let previewW = 0;
    let previewH = 0;
    let gridState = null;
    let cropResults = [];

    function setStatus(msg){
      els.status.innerHTML = msg;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function sanitizeFileName(name){
      const cleaned = (name || "image")
        .trim()
        .replace(/[\\\/:*?"<>|]+/g, "_")
        .replace(/\s+/g, " ");
      return cleaned || "image";
    }

    function getBaseFileName(){
      return sanitizeFileName(els.fileName.value);
    }

    function getSettings(){
      const cols = clamp(parseInt(els.cols.value || "1", 10), 1, 24);
      const rows = clamp(parseInt(els.rows.value || "1", 10), 1, 24);
      const gap = clamp(parseInt(els.gap.value || "0", 10), 0, 100);
      els.cols.value = cols;
      els.rows.value = rows;
      els.gap.value = gap;
      return { cols, rows, gap };
    }

    function syncCanvasSize(){
      if(!sourceImage) return;
      const maxPreview = 1100;
      previewScale = Math.min(1, maxPreview / Math.max(sourceW, sourceH));
      previewW = Math.max(1, Math.round(sourceW * previewScale));
      previewH = Math.max(1, Math.round(sourceH * previewScale));

      els.canvasWrap.style.aspectRatio = `${previewW} / ${previewH}`;
      els.baseCanvas.width = previewW;
      els.baseCanvas.height = previewH;
      els.gridCanvas.width = previewW;
      els.gridCanvas.height = previewH;

      els.baseCanvas.classList.remove("hidden");
      els.gridCanvas.classList.remove("hidden");
      els.empty.classList.add("hidden");
    }

    function buildInitialGrid(){
      const { cols, rows } = getSettings();
      const xs = [];
      const ys = [];

      for(let i=0; i<=cols; i++){
        xs.push(Math.round((sourceW / cols) * i));
      }
      for(let j=0; j<=rows; j++){
        ys.push(Math.round((sourceH / rows) * j));
      }

      gridState = {
        cols,
        rows,
        gap: parseInt(els.gap.value, 10),
        xs,
        ys,
        activeHandle: null
      };
    }

    function drawBase(){
      if(!sourceImage) return;
      const ctx = els.baseCanvas.getContext("2d");
      ctx.clearRect(0,0,previewW,previewH);
      ctx.drawImage(sourceImage, 0, 0, previewW, previewH);
    }

    function drawGrid(){
      if(!gridState) return;
      const ctx = els.gridCanvas.getContext("2d");
      ctx.clearRect(0,0,previewW,previewH);

      const gap = gridState.gap;
      ctx.save();
      ctx.strokeStyle = "rgba(0,0,0,0.95)";
      ctx.fillStyle = "rgba(0,0,128,0.10)";
      ctx.lineWidth = 1;

      for(let r=0; r<gridState.rows; r++){
        for(let c=0; c<gridState.cols; c++){
          const x0 = gridState.xs[c];
          const x1 = gridState.xs[c+1];
          const y0 = gridState.ys[r];
          const y1 = gridState.ys[r+1];

          const padX = gap / 2;
          const padY = gap / 2;

          const sx0 = clamp(x0 + (c > 0 ? padX : 0), 0, sourceW);
          const sy0 = clamp(y0 + (r > 0 ? padY : 0), 0, sourceH);
          const sx1 = clamp(x1 - (c < gridState.cols - 1 ? padX : 0), 0, sourceW);
          const sy1 = clamp(y1 - (r < gridState.rows - 1 ? padY : 0), 0, sourceH);

          const px0 = sx0 * previewScale;
          const py0 = sy0 * previewScale;
          const pw = Math.max(0, (sx1 - sx0) * previewScale);
          const ph = Math.max(0, (sy1 - sy0) * previewScale);

          if(pw > 0 && ph > 0){
            ctx.fillRect(px0, py0, pw, ph);
            ctx.strokeRect(px0 + 0.5, py0 + 0.5, pw, ph);
          }
        }
      }

      const radius = 8;
      const strokeRadius = 8;
      for(let i=0; i<gridState.xs.length; i++){
        for(let j=0; j<gridState.ys.length; j++){
          const x = gridState.xs[i] * previewScale;
          const y = gridState.ys[j] * previewScale;
          const active = gridState.activeHandle &&
                         gridState.activeHandle.i === i &&
                         gridState.activeHandle.j === j;

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);

          if(active){
            ctx.fillStyle = "rgba(0,0,255,1)";
            ctx.shadowColor = "rgba(0,0,255,0.9)";
            ctx.shadowBlur = 10;
          }else{
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "transparent";
            ctx.shadowBlur = 0;
          }

          ctx.fill();
          ctx.strokeStyle = active ? "rgba(255,255,255,0.95)" : "#000000";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      ctx.restore();
    }

    function renderAll(){
      if(!sourceImage || !gridState) return;
      drawBase();
      drawGrid();
    }

    function clampLinePositions(){
      if(!gridState) return;

      const minCell = 12;
      const xs = gridState.xs;
      const ys = gridState.ys;

      xs[0] = clamp(xs[0], 0, sourceW);
      ys[0] = clamp(ys[0], 0, sourceH);
      xs[xs.length - 1] = clamp(xs[xs.length - 1], 0, sourceW);
      ys[ys.length - 1] = clamp(ys[ys.length - 1], 0, sourceH);

      for(let i=1; i<xs.length-1; i++){
        xs[i] = clamp(xs[i], xs[i-1] + minCell, xs[i+1] - minCell);
      }
      for(let j=1; j<ys.length-1; j++){
        ys[j] = clamp(ys[j], ys[j-1] + minCell, ys[j+1] - minCell);
      }
    }

    function loadFile(file){
      if(!file) return;
      sourceName = (file.name || "image").replace(/\.[^.]+$/, "") || "image";

      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        sourceImage = img;
        sourceW = img.naturalWidth || img.width;
        sourceH = img.naturalHeight || img.height;

        els.controls.classList.remove("hidden");
        els.split.classList.remove("hidden");
        els.exportBox.classList.add("hidden");
        els.resultHeader.classList.add("hidden");
        els.resultGrid.innerHTML = "";
        cropResults = [];
        els.fileName.value = sourceName;

        if(!els.cols.value) els.cols.value = 4;
        if(!els.rows.value) els.rows.value = 4;
        if(!els.gap.value) els.gap.value = 0;

        syncCanvasSize();
        buildInitialGrid();
        renderAll();

        setStatus(`Gambar dimuat: <strong>${sourceW}×${sourceH}</strong>.`);
        URL.revokeObjectURL(url);
        els.downloadZip.disabled = true;
        els.downloadAll.disabled = true;
      };
      img.onerror = () => {
        setStatus("Gagal membaca gambar.");
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    els.file.addEventListener("change", e => loadFile(e.target.files[0]));

    els.cols.addEventListener("change", () => {
      if(!sourceImage) return;
      const nextCols = clamp(parseInt(els.cols.value || "1", 10), 1, 24);
      els.cols.value = nextCols;

      const old = gridState;
      const newXs = [];
      for(let i=0; i<=nextCols; i++){
        const t = i / nextCols;
        newXs.push(Math.round(sourceW * t));
      }

      if(old){
        gridState = {
          cols: nextCols,
          rows: old.rows,
          gap: old.gap,
          xs: newXs,
          ys: old.ys.slice(),
          activeHandle: null
        };
      }else{
        buildInitialGrid();
      }
      renderAll();
    });

    els.rows.addEventListener("change", () => {
      if(!sourceImage) return;
      const nextRows = clamp(parseInt(els.rows.value || "1", 10), 1, 24);
      els.rows.value = nextRows;

      const old = gridState;
      const newYs = [];
      for(let j=0; j<=nextRows; j++){
        const t = j / nextRows;
        newYs.push(Math.round(sourceH * t));
      }

      if(old){
        gridState = {
          cols: old.cols,
          rows: nextRows,
          gap: old.gap,
          xs: old.xs.slice(),
          ys: newYs,
          activeHandle: null
        };
      }else{
        buildInitialGrid();
      }
      renderAll();
    });

    els.gap.addEventListener("change", () => {
      if(!sourceImage) return;
      const nextGap = clamp(parseInt(els.gap.value || "0", 10), 0, 100);
      els.gap.value = nextGap;
      if(gridState){
        gridState.gap = nextGap;
        renderAll();
      }
    });

    els.split.addEventListener("click", async () => {
      if(!sourceImage || !gridState) return;

      clampLinePositions();
      renderAll();

      cropResults = [];
      els.resultGrid.innerHTML = "";
      els.resultHeader.classList.remove("hidden");
      els.exportBox.classList.remove("hidden");
      els.downloadZip.classList.add("hidden");
      els.downloadAll.classList.add("hidden");

      setStatus("Memotong gambar...");

      const gap = gridState.gap;
      const baseName = getBaseFileName();
      let index = 0;

      for(let r=0; r<gridState.rows; r++){
        for(let c=0; c<gridState.cols; c++){
          const x0 = gridState.xs[c];
          const x1 = gridState.xs[c+1];
          const y0 = gridState.ys[r];
          const y1 = gridState.ys[r+1];

          const leftPad = c > 0 ? gap / 2 : 0;
          const rightPad = c < gridState.cols - 1 ? gap / 2 : 0;
          const topPad = r > 0 ? gap / 2 : 0;
          const bottomPad = r < gridState.rows - 1 ? gap / 2 : 0;

          const sx0 = clamp(Math.round(x0 + leftPad), 0, sourceW);
          const sy0 = clamp(Math.round(y0 + topPad), 0, sourceH);
          const sx1 = clamp(Math.round(x1 - rightPad), 0, sourceW);
          const sy1 = clamp(Math.round(y1 - bottomPad), 0, sourceH);

          const w = sx1 - sx0;
          const h = sy1 - sy0;
          if(w <= 0 || h <= 0) continue;

          index++;

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(sourceImage, sx0, sy0, w, h, 0, 0, w, h);

          const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
          const filename = `${baseName}-part-${String(index).padStart(2, "0")}.png`;

          cropResults.push({ filename, blob, w, h });

          const card = document.createElement("div");
          card.className = "card";

          const thumb = document.createElement("div");
          thumb.className = "thumb";

          const img = document.createElement("img");
          img.src = URL.createObjectURL(blob);
          img.alt = filename;
          thumb.appendChild(img);

          const meta = document.createElement("div");
          meta.className = "cardMeta";
          meta.innerHTML = `<span><strong>#${index}</strong></span><span>${w}×${h}</span>`;

          const btnRow = document.createElement("div");
          btnRow.className = "btnrow";

          const dl = document.createElement("button");
          dl.textContent = "Download";
          dl.addEventListener("click", () => {
            const a = document.createElement("a");
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1200);
          });

          btnRow.appendChild(dl);
          card.appendChild(thumb);
          card.appendChild(meta);
          card.appendChild(btnRow);
          els.resultGrid.appendChild(card);
        }
      }

      els.resultCount.textContent = `${cropResults.length} bagian`;
      if(cropResults.length){
        els.downloadZip.classList.remove("hidden");
        els.downloadAll.classList.remove("hidden");
        setStatus(`Selesai. Ada <strong>${cropResults.length}</strong> potongan.`);
      }else{
        setStatus("Tidak ada area yang bisa dipotong.");
      }
    });

    els.downloadZip.addEventListener("click", async () => {
      if(!cropResults.length) return;
      const baseName = getBaseFileName();
      setStatus("Menyiapkan ZIP...");
      try{
        const zip = new JSZip();
        const folder = zip.folder(`${baseName}-parts`);
        for(const item of cropResults){
          folder.file(item.filename, item.blob);
        }
        const blob = await zip.generateAsync({ type:"blob" });
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `${baseName}-parts.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
        setStatus(`ZIP siap diunduh berisi <strong>${cropResults.length}</strong> gambar.`);
      }catch(err){
        console.error(err);
        setStatus("Gagal membuat ZIP.");
      }
    });

    els.downloadAll.addEventListener("click", async () => {
      if(!cropResults.length) return;
      setStatus("Mengunduh PNG satu per satu...");
      for(const item of cropResults){
        const a = document.createElement("a");
        const url = URL.createObjectURL(item.blob);
        a.href = url;
        a.download = item.filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        await new Promise(r => setTimeout(r, 180));
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      }
      setStatus(`Semua PNG sudah dipicu untuk diunduh (${cropResults.length} file).`);
    });

    // Drag grid from inside area, not from circles
    let draggingGrid = false;
    let activeHandle = null;
    let dragStart = null;
    let startXs = null;
    let startYs = null;

    function getPointerInCanvas(evt){
      const rect = els.gridCanvas.getBoundingClientRect();
      const x = (evt.clientX - rect.left) * (els.gridCanvas.width / rect.width);
      const y = (evt.clientY - rect.top) * (els.gridCanvas.height / rect.height);
      return { x, y };
    }

    function findNearestHandle(px, py){
      if(!gridState) return null;
      const hitRadius = 18;
      let best = null;
      let bestDist = Infinity;

      for(let i=0; i<gridState.xs.length; i++){
        for(let j=0; j<gridState.ys.length; j++){
          const x = gridState.xs[i] * previewScale;
          const y = gridState.ys[j] * previewScale;
          const d = Math.hypot(px - x, py - y);
          if(d <= hitRadius && d < bestDist){
            bestDist = d;
            best = { i, j };
          }
        }
      }
      return best;
    }

    function isInsideInnerGrid(px, py){
      if(!gridState) return false;
      const left = Math.min(...gridState.xs) * previewScale;
      const right = Math.max(...gridState.xs) * previewScale;
      const top = Math.min(...gridState.ys) * previewScale;
      const bottom = Math.max(...gridState.ys) * previewScale;
      return px >= left && px <= right && py >= top && py <= bottom;
    }

    els.gridCanvas.addEventListener("pointerdown", (evt) => {
      if(!sourceImage || !gridState) return;

      const p = getPointerInCanvas(evt);
      const hit = findNearestHandle(p.x, p.y);

      if(hit){
        activeHandle = hit;
        gridState.activeHandle = hit;
        draggingGrid = false;
        els.gridCanvas.setPointerCapture(evt.pointerId);
        dragStart = { x: p.x, y: p.y };
        startXs = gridState.xs.slice();
        startYs = gridState.ys.slice();
        renderAll();
        return;
      }

      if(isInsideInnerGrid(p.x, p.y)){
        draggingGrid = true;
        activeHandle = null;
        gridState.activeHandle = null;
        els.gridCanvas.setPointerCapture(evt.pointerId);
        dragStart = { x: p.x, y: p.y };
        startXs = gridState.xs.slice();
        startYs = gridState.ys.slice();
        renderAll();
      }
    });

    els.gridCanvas.addEventListener("pointermove", (evt) => {
      if(!sourceImage || !gridState || !dragStart) return;

      const p = getPointerInCanvas(evt);
      const dx = Math.round((p.x - dragStart.x) / previewScale);
      const dy = Math.round((p.y - dragStart.y) / previewScale);

      if(activeHandle){
        const { i, j } = activeHandle;
        gridState.xs = startXs.slice();
        gridState.ys = startYs.slice();

        gridState.xs[i] = startXs[i] + dx;
        gridState.ys[j] = startYs[j] + dy;

        clampLinePositions();
        gridState.activeHandle = activeHandle;
        renderAll();
        return;
      }

      if(draggingGrid){
        const newXs = startXs.map(v => v + dx);
        const newYs = startYs.map(v => v + dy);

        const minX = Math.min(...newXs);
        const maxX = Math.max(...newXs);
        const minY = Math.min(...newYs);
        const maxY = Math.max(...newYs);

        let shiftX = 0;
        let shiftY = 0;

        if(minX < 0) shiftX = -minX;
        if(maxX + shiftX > sourceW) shiftX += sourceW - (maxX + shiftX);

        if(minY < 0) shiftY = -minY;
        if(maxY + shiftY > sourceH) shiftY += sourceH - (maxY + shiftY);

        gridState.xs = newXs.map(v => v + shiftX);
        gridState.ys = newYs.map(v => v + shiftY);

        clampLinePositions();
        gridState.activeHandle = null;
        renderAll();
      }
    });

    function endDrag(){
      draggingGrid = false;
      activeHandle = null;
      dragStart = null;
      startXs = null;
      startYs = null;
      if(gridState){
        gridState.activeHandle = null;
        renderAll();
      }
    }

    els.gridCanvas.addEventListener("pointerup", endDrag);
    els.gridCanvas.addEventListener("pointercancel", endDrag);
    els.gridCanvas.addEventListener("pointerleave", endDrag);

    window.addEventListener("resize", () => {
      if(sourceImage){
        syncCanvasSize();
        renderAll();
      }
    });

    setStatus("Belum ada gambar dimuat.");
  </script>
</body>
</html>
